<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>iPad 26 专用版 - 背单词</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif;background:#f4f8ff;color:#233044}
.wrap{max-width:980px;margin:0 auto;padding:14px;padding-top:max(14px,env(safe-area-inset-top));padding-bottom:max(14px,env(safe-area-inset-bottom))}
.card{background:#fff;border:1px solid #e7edf7;border-radius:18px;padding:14px;box-shadow:0 8px 20px rgba(35,48,68,.08);margin-bottom:12px}
.title{font-size:28px;font-weight:900;margin:0 0 8px 0}.small{font-size:13px;color:#6b7a90}.status{padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;display:inline-block}.s-red{background:#fff1f2;color:#b42318}.s-green{background:#ecfdf3;color:#027a48}.row{text-align:center}.btn{border:0;border-radius:999px;padding:12px 16px;margin:4px;font-weight:800;font-size:16px;cursor:pointer;background:#eaf2ff;color:#23456e}.btn:active{transform:scale(.98)}.blue{background:#4f8cff;color:#fff}.green{background:#19a463;color:#fff}.red{background:#e5484d;color:#fff}.orange{background:#f59e0b;color:#fff}.purple{background:#7c3aed;color:#fff}
.grid{display:grid;grid-template-columns:260px 1fr;gap:12px}.cat{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid #e8eef8;border-radius:14px;margin:8px 0;cursor:pointer}.cat.on{background:#eaf3ff;border-color:#89bdff;color:#1257a6}.word{font-size:52px;font-weight:900;text-align:center;color:#2563eb;margin:12px 0}.mean{font-size:28px;font-weight:900;text-align:center;margin:12px 0}.phon,.ex{text-align:center}.phon{color:#6b7a90}.ex{font-size:18px;line-height:1.7;color:#4d6077;margin-top:12px}.box{min-height:360px;border:1px solid #e8eef8;border-radius:22px;padding:18px;background:linear-gradient(160deg,#fff,#f7fbff)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f8fbff;border-radius:14px;padding:10px;text-align:center}.stat strong{display:block;font-size:22px}.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.opt{border:2px solid #e8eef8;background:#fff;border-radius:16px;padding:14px;text-align:left;font-size:17px;font-weight:800}.ok{background:#ecfdf3 !important;border-color:#19a463 !important}.bad{background:#fff1f2 !important;border-color:#e5484d !important}.input,textarea,select{width:100%;box-sizing:border-box;padding:12px;border:2px solid #dfe7f3;border-radius:14px;font-size:16px}.hide{display:none}.note{background:#fff8e6;border:1px solid #ffd98d;color:#7a5000;border-radius:14px;padding:12px;line-height:1.6}.list{max-height:340px;overflow:auto}.item{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px dashed #e4eaf4;padding:10px 0}.progress{height:12px;background:#e8eef8;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#19a463,#4f8cff)}
@media (max-width:800px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.opts{grid-template-columns:1fr}.word{font-size:40px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">📘 iPad 26 专用版（极限兼容）</div>
    <div style="margin:8px 0">
      <span id="jsStatus" class="status s-red">JS未启动</span>
      <span id="audioStatus" class="status s-red">声音未解锁</span>
    </div>
    <div class="small">这个版本使用更老式、兼容性更高的 JavaScript 写法（避免新语法导致的兼容问题）。如果打开后“JS未启动”没有变绿，说明是 iPad 文件预览器阻止脚本，而不是程序本身。</div>
    <div class="row" style="margin-top:10px">
      <button class="btn blue" onclick="unlockApp()">点击启用并进入</button>
      <button class="btn" onclick="testClick()">测试按钮</button>
      <button class="btn blue" onclick="showMode('learn')">学习</button>
      <button class="btn green" onclick="showMode('quiz')">选择题</button>
      <button class="btn orange" onclick="showMode('spell')">拼写</button>
      <button class="btn purple" onclick="showMode('review')">今日复习</button>
      <button class="btn" onclick="showMode('game')">游戏闯关</button>
      <button class="btn green" onclick="saveAll()">保存进度</button>
      <button class="btn" onclick="showMode('manage')">词库管理</button>
    </div>
    <div id="saveHint" class="small" style="margin-top:8px"></div>
    <div class="progress"><div id="bar" class="bar"></div></div>
  </div>

  <div class="card stats">
    <div class="stat"><strong id="stTotal">0</strong>总词数</div>
    <div class="stat"><strong id="stMaster">0</strong>已掌握</div>
    <div class="stat"><strong id="stWrong">0</strong>错词</div>
    <div class="stat"><strong id="stAcc">0%</strong>正确率</div>
  </div>

  <div class="grid">
    <div class="card">
      <h3 style="margin-top:0">分类</h3>
      <div id="cats"></div>
      <h3>设置</h3>
      <div class="small">每日新词目标</div>
      <select id="goal" onchange="saveSettings()"><option>20</option><option>30</option><option>50</option><option>80</option></select>
      <div style="margin-top:8px">
        <button class="btn" onclick="shuffleWords()">随机顺序</button>
        <button class="btn red" onclick="resetProgress()">清空进度</button>
      </div>
      <div class="note" style="margin-top:12px">如果你点开文件后顶部“JS未启动”仍然是红色，说明 iPad 当前打开方式不执行脚本。这个版本已经尽量规避语法兼容问题。</div>
    </div>
    <div class="card">
      <div id="viewLearn"></div>
      <div id="viewQuiz" class="hide"></div>
      <div id="viewSpell" class="hide"></div>
      <div id="viewReview" class="hide"></div>
      <div id="viewGame" class="hide"></div>
      <div id="viewManage" class="hide"></div>
    </div>
  </div>
</div>
<script>
var seed = [
['apple','苹果','食物和饮品','/ˈæpl/','An apple a day keeps the doctor away.'],['banana','香蕉','食物和饮品','/bəˈnɑːnə/','He is eating a banana.'],['orange','橙色的；橙子','食物和饮品','/ˈɒrɪndʒ/','My favourite fruit is orange.'],['pear','梨','食物和饮品','/peə(r)/','This pear tastes sweet.'],['grape','葡萄','食物和饮品','/ɡreɪp/','Grandpa picked many grapes.'],['carrot','胡萝卜','食物和饮品','/ˈkærət/','Rabbits love eating carrots.'],['potato','土豆','食物和饮品','/pəˈteɪtəʊ/','The potato is very big.'],['tomato','西红柿','食物和饮品','/təˈmɑːtəʊ/','I cut the tomato in half.'],['milk','牛奶','食物和饮品','/mɪlk/','Can I drink some milk?'],['water','水','食物和饮品','/ˈwɔːtə(r)/','I need a glass of water.'],
['red','红色的；红色','颜色和形状','/red/','What fine red apples!'],['blue','蓝色的；蓝色','颜色和形状','/bluː/','She is wearing a blue dress.'],['green','绿色的；绿色','颜色和形状','/ɡriːn/','The grass is green.'],['yellow','黄色的；黄色','颜色和形状','/ˈjeləʊ/','There is a yellow flower.'],['black','黑色的；黑色','颜色和形状','/blæk/','She has black hair.'],['white','白色的；白色','颜色和形状','/waɪt/','His hair is snow white.'],['big','大的','颜色和形状','/bɪg/','The elephant is big.'],['small','小的','颜色和形状','/smɔːl/','It has small eyes and big ears.'],
['Monday','星期一','星期和月份','/ˈmʌndeɪ/','She started work last Monday.'],['Tuesday','星期二','星期和月份','/ˈtjuːzdeɪ/','I will arrive on Tuesday morning.'],['Wednesday','星期三','星期和月份','/ˈwenzdeɪ/','We will meet on Wednesday.'],['Thursday','星期四','星期和月份','/ˈθɜːzdeɪ/','Thursday is the market day.'],['Friday','星期五','星期和月份','/ˈfraɪdeɪ/','Next Friday is September sixth.']
];
var words = [], state = {}, settings = {goal:'20'}, game = {level:1,best:0}, idx = 0, cat = '全部', mode = 'learn', audioReady = false, lastAuto = '';
function $(id){return document.getElementById(id);} function day(){return new Date().toISOString().slice(0,10);} function esc(s){return String(s||'').replace(/'/g,"\\'")}
function loadData(){ try{words=JSON.parse(localStorage.getItem('ipad26_words')||'null')||mapSeed();}catch(e){words=mapSeed();} try{state=JSON.parse(localStorage.getItem('ipad26_state')||'{}');}catch(e){state={};} try{settings=JSON.parse(localStorage.getItem('ipad26_set')||'{"goal":"20"}');}catch(e){settings={goal:'20'};} try{game=JSON.parse(localStorage.getItem('ipad26_game')||'{"level":1,"best":0}');}catch(e){game={level:1,best:0};} }
function mapSeed(){ var a=[],i; for(i=0;i<seed.length;i++){a.push({w:seed[i][0],m:seed[i][1],c:seed[i][2],p:seed[i][3],e:seed[i][4]});} return a; }
function saveAll(){ try{localStorage.setItem('ipad26_words',JSON.stringify(words));localStorage.setItem('ipad26_state',JSON.stringify(state));localStorage.setItem('ipad26_set',JSON.stringify(settings));localStorage.setItem('ipad26_game',JSON.stringify(game));$('saveHint').innerHTML='已保存 '+(new Date()).toLocaleTimeString();}catch(e){} }
function saveSettings(){ settings.goal = $('goal').value; saveAll(); }
function rec(w){ return state[w.w] || {r:0,w:0,l:0,d:day(),f:false,m:false}; }
function setRec(w,r){ state[w.w]=r; saveAll(); renderStats(); }
function arr(){ var i,a=[]; if(cat==='全部'){ return words; } for(i=0;i<words.length;i++){ if(words[i].c===cat){a.push(words[i]);} } return a; }
function curWord(){ var a=arr(); if(!a.length){return null;} if(idx<0){idx=a.length-1;} if(idx>=a.length){idx=0;} return a[idx]; }
function nextWord(n){ idx += n; draw(); }
function speakOnce(t){ if(!audioReady || !window.speechSynthesis){return;} try{ window.speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.85; window.speechSynthesis.speak(u);}catch(e){} }
function speak3(t){ if(!audioReady || !window.speechSynthesis){return;} try{ window.speechSynthesis.cancel(); var n=0; var play=function(){ n++; var u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.82; u.onend=function(){ if(n<3){ setTimeout(play,180); } }; window.speechSynthesis.speak(u); }; play(); }catch(e){} }
function mark(ok){ var w = curWord(); if(!w){return;} var r = rec(w); if(ok){r.r += 1; r.l = Math.min(r.l+1, 6);} else {r.w += 1; r.l = Math.max(r.l-1, 0);} r.m = r.l >= 4; var it=[0,1,2,4,7,15,30], d=new Date(); d.setDate(d.getDate()+it[r.l]); r.d=d.toISOString().slice(0,10); setRec(w,r); }
function testClick(){ alert('按钮可点击，脚本正常运行'); }
function unlockApp(){ audioReady = true; try{ if(window.speechSynthesis){ var u = new SpeechSynthesisUtterance('ready'); u.volume=0; u.lang='en-US'; window.speechSynthesis.speak(u); window.speechSynthesis.cancel(); } }catch(e){} $('audioStatus').className='status s-green'; $('audioStatus').innerHTML='声音已解锁'; draw(); }
function categories(){ var o={'全部':1}, i, out=['全部']; for(i=0;i<words.length;i++){ if(!o[words[i].c]){ o[words[i].c]=1; out.push(words[i].c); } } return out; }
function renderCats(){ var cs=categories(), html='', i, c, n, j; for(i=0;i<cs.length;i++){ c=cs[i]; n=0; if(c==='全部'){n=words.length;} else {for(j=0;j<words.length;j++){ if(words[j].c===c){n++;} }} html += '<div class="cat '+(c===cat?'on':'')+'" onclick="setCategory(\''+esc(c)+'\')"><span>'+c+'</span><b>'+n+'</b></div>'; } $('cats').innerHTML = html; }
function setCategory(c){ cat=c; idx=0; draw(); }
function renderStats(){ var i,R=0,W=0,M=0, wrongCnt=0, rw; for(i=0;i<words.length;i++){ rw = rec(words[i]); R += rw.r; W += rw.w; if(rw.m){M++;} if(rw.w>0){wrongCnt++;} } $('stTotal').innerHTML=words.length; $('stMaster').innerHTML=M; $('stWrong').innerHTML=wrongCnt; $('stAcc').innerHTML=(R+W?Math.round(R*100/(R+W)):0)+'%'; $('bar').style.width=(words.length?Math.round(M*100/words.length):0)+'%'; }
function hideAll(){ $('viewLearn').className='hide'; $('viewQuiz').className='hide'; $('viewSpell').className='hide'; $('viewReview').className='hide'; $('viewGame').className='hide'; $('viewManage').className='hide'; }
function showMode(m){ mode=m; draw(); }
function renderLearn(){ var w=curWord(), r, html=''; if(!w){$('viewLearn').innerHTML='<p>没有词条</p>'; return;} r=rec(w); html+='<h3>📖 学习模式 <span class="small">'+w.c+'</span></h3>'; html+='<div class="box">'; html+='<div class="word">'+w.w+'</div><div class="phon">'+w.p+'</div><div class="mean">'+w.m+'</div><div class="ex">'+w.e+'</div>'; html+='<div class="row"><button class="btn blue" onclick="speakWord()">🔊 单词朗读</button><button class="btn" onclick="speakSentence()">📣 例句朗读</button><button class="btn green" onclick="knowWord()">会了</button><button class="btn red" onclick="notKnowWord()">不熟</button><button class="btn" onclick="toggleFav()">'+(r.f?'★ 已收藏':'☆ 收藏')+'</button></div>'; html+='<div class="small">记忆等级：'+r.l+'｜复习日：'+r.d+'｜显示后自动朗读3次</div>'; html+='</div>'; html+='<div class="row"><button class="btn" onclick="nextWord(-1)">上一词</button><button class="btn blue" onclick="nextWord(1)">下一词</button></div>'; $('viewLearn').innerHTML=html; if(lastAuto!==w.w){ lastAuto=w.w; speak3(w.w); } }
function speakWord(){ var w=curWord(); if(w){speakOnce(w.w);} }
function speakSentence(){ var w=curWord(); if(w){speakOnce(w.e);} }
function knowWord(){ mark(true); idx++; draw(); }
function notKnowWord(){ mark(false); idx++; draw(); }
function toggleFav(){ var w=curWord(); if(!w){return;} var r=rec(w); r.f=!r.f; setRec(w,r); draw(); }
function pickOptions(correct){ var pool=[],i,arr=[],temp,j; for(i=0;i<words.length;i++){ if(words[i].w!==correct.w){ pool.push(words[i]); } } for(i=pool.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); temp=pool[i]; pool[i]=pool[j]; pool[j]=temp; } arr=[correct,pool[0],pool[1],pool[2]]; for(i=arr.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); temp=arr[i]; arr[i]=arr[j]; arr[j]=temp; } return arr; }
function renderQuiz(){ var w=curWord(), os, html='', i; if(!w){return;} os=pickOptions(w); html+='<h3>✅ 选择题：根据中文选英文</h3><div class="box"><div class="mean">'+w.m+'</div><div class="opts">'; for(i=0;i<os.length;i++){ html+='<button class="opt" data-w="'+os[i].w+'" onclick="ansQuiz(this,\''+esc(w.w)+'\')">'+os[i].w+'</button>'; } html+='</div><div id="quizFb" style="font-weight:900;margin-top:12px"></div></div><div class="row"><button class="btn blue" onclick="nextWord(1)">下一题</button></div>'; $('viewQuiz').innerHTML=html; }
function ansQuiz(btn,right){ var ok = btn.getAttribute('data-w')===right, opts = document.querySelectorAll('#viewQuiz .opt'), i; if(ok){btn.className+=' ok';} else {btn.className+=' bad';} for(i=0;i<opts.length;i++){ opts[i].disabled=true; if(opts[i].getAttribute('data-w')===right){ opts[i].className+=' ok'; }} $('quizFb').innerHTML = ok ? '答对了！' : '答错了，答案：'+right; mark(ok); if(ok){speakOnce(right);} }
function renderSpell(){ var w=curWord(), html=''; if(!w){return;} html+='<h3>✍️ 拼写测试</h3><div class="box"><div class="mean">'+w.m+'</div><div class="phon">'+w.p+'</div><input id="spellInput" class="input" placeholder="请输入英文单词"><div class="row"><button class="btn blue" onclick="checkSpell()">提交</button><button class="btn" onclick="speakWord()">听单词</button></div><div id="spellFb" style="font-weight:900"></div></div>'; $('viewSpell').innerHTML=html; }
function checkSpell(){ var w=curWord(), v; if(!w){return;} v = $('spellInput').value || ''; v = v.replace(/^\s+|\s+$/g,'').toLowerCase(); var ok = v===w.w.toLowerCase(); $('spellFb').innerHTML = ok ? '拼写正确！' : '不正确，答案：'+w.w; $('spellFb').style.color = ok ? '#19a463' : '#e5484d'; mark(ok); }
function renderReview(){ var i, due=[], html=''; for(i=0;i<words.length;i++){ if(rec(words[i]).d<=day() || rec(words[i]).w>0){ due.push(words[i]); } } html+='<h3>🔁 今日复习</h3><div class="note">今日建议复习 '+due.length+' 个词；错词和到期词优先。</div><div class="list">'; if(!due.length){ html+='<p>今天暂无到期复习词。</p>'; } else { for(i=0;i<due.length;i++){ html+='<div class="item"><div><b>'+due[i].w+'</b><div class="small">'+due[i].m+'｜'+due[i].c+'</div></div><button class="btn" onclick="goWord(\''+esc(due[i].w)+'\')">学习</button></div>'; } } html+='</div>'; $('viewReview').innerHTML=html; }
function goWord(wd){ var i; for(i=0;i<words.length;i++){ if(words[i].w===wd){ idx=i; break; } } showMode('learn'); }
function renderGameHome(){ $('viewGame').innerHTML='<h3>🎮 游戏闯关</h3><div class="note">每关10题，根据中文选择英文。答对得10分，80分以上自动解锁下一关；闯关进度会保存。</div><div class="box"><div class="mean">第 '+game.level+' 关</div><div class="small">历史最佳：'+game.best+' 分</div><div class="row"><button class="btn blue" onclick="startGame()">开始闯关</button></div></div>'; }
function startGame(){ var start=((game.level-1)*10)%Math.max(words.length,1), ordered=words.slice(start).concat(words.slice(0,start)); gameQ=ordered.slice(0,10); gameI=0; gameScore=0; renderGameQ(); }
function renderGameQ(){ var w=gameQ[gameI], os, html='', i; if(!w){ finishGame(); return; } os=pickOptions(w); html+='<h3>🎮 第 '+game.level+' 关 <span class="small">'+(gameI+1)+' / '+gameQ.length+'</span></h3><div class="box"><div class="mean">'+w.m+'</div><div class="small">当前得分：'+gameScore+'</div><div class="opts">'; for(i=0;i<os.length;i++){ html+='<button class="opt" data-w="'+os[i].w+'" onclick="ansGame(this,\''+esc(w.w)+'\')">'+os[i].w+'</button>'; } html+='</div><div id="gameFb" style="font-weight:900;margin-top:12px"></div></div>'; $('viewGame').innerHTML=html; }
function ansGame(btn,right){ var ok = btn.getAttribute('data-w')===right, opts = document.querySelectorAll('#viewGame .opt'), i; if(ok){btn.className+=' ok'; gameScore += 10; speakOnce(right);} else {btn.className+=' bad';} for(i=0;i<opts.length;i++){ opts[i].disabled=true; if(opts[i].getAttribute('data-w')===right){ opts[i].className+=' ok'; } } $('gameFb').innerHTML = ok ? '答对 +10' : '答错，答案：'+right; mark(ok); setTimeout(function(){ gameI++; renderGameQ(); }, 650); }
function finishGame(){ var pass = gameScore>=80, stars='⭐'; if(gameScore>game.best){game.best=gameScore;} if(pass){game.level += 1;} if(gameScore>=100){stars='⭐⭐⭐';} else if(gameScore>=80){stars='⭐⭐';} saveAll(); $('viewGame').innerHTML='<h3>🎮 闯关结果</h3><div class="box"><div class="word" style="font-size:42px">'+stars+'</div><div class="mean">本关得分：'+gameScore+'</div><div class="ex">'+(pass?'恭喜过关，已解锁下一关！':'未达到80分，再练一次即可继续挑战。')+'</div><div class="row"><button class="btn blue" onclick="startGame()">再玩一次</button><button class="btn" onclick="showMode(\'learn\')">返回学习</button></div></div>'; renderStats(); }
function parseImport(t){ t = t || ''; t = t.replace(/^\s+|\s+$/g,''); if(!t){return [];} var out=[], lines, i, p; if(t.charAt(0)=='['){ try{ var arr=JSON.parse(t), x; for(i=0;i<arr.length;i++){ x=arr[i]; if((x.w||x.word) && (x.m||x.meaning)){ out.push({w:x.w||x.word,m:x.m||x.meaning,c:x.c||x.category||'自定义',p:x.p||x.phonetic||'',e:x.e||x.example||''}); } } return out; }catch(e){ return []; } } lines=t.split(/\n+/); for(i=0;i<lines.length;i++){ p=lines[i].split(','); if((p[0]||'').replace(/^\s+|\s+$/g,'') && (p[1]||'').replace(/^\s+|\s+$/g,'')){ out.push({w:(p[0]||'').replace(/^\s+|\s+$/g,''),m:(p[1]||'').replace(/^\s+|\s+$/g,''),c:(p[2]||'自定义').replace(/^\s+|\s+$/g,''),p:(p[3]||'').replace(/^\s+|\s+$/g,''),e:p.slice(4).join(',').replace(/^\s+|\s+$/g,'')}); } } return out; }
function dl(name,text){ var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'})); a.download=name; a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},800); }
function renderManage(){ var html='', list=[], i, r; for(i=0;i<words.length;i++){ r=rec(words[i]); if(r.f || r.w){ list.push(words[i]); } } html+='<h3>📦 词库管理</h3><div class="note">支持 CSV / JSON 导入；支持导出词库和进度码。CSV格式：word,meaning,category,phonetic,example。</div>'; html+='<div class="row"><button class="btn green" onclick="dl(\'小学英语词库.json\',JSON.stringify(words,null,2))">导出词库</button><button class="btn orange" onclick="dl(\'背单词进度码.txt\',btoa(unescape(encodeURIComponent(JSON.stringify({words:words,state:state,settings:settings,game:game})))) )">导出进度码</button><button class="btn" onclick="importProg()">导入进度码</button></div>'; html+='<textarea id="importBox" placeholder="apple,苹果,食物和饮品,/ˈæpl/,An apple a day keeps the doctor away."></textarea>'; html+='<div class="row"><button class="btn blue" onclick="importWords(false)">追加/更新词库</button><button class="btn red" onclick="importWords(true)">替换当前词库</button><button class="btn" onclick="restoreSeed()">恢复示例词库</button></div>'; html+='<h3>⭐ 收藏 / 错词</h3><div class="list">'; if(!list.length){ html+='<p>暂无收藏或错词。</p>'; } else { for(i=0;i<list.length;i++){ r=rec(list[i]); html+='<div class="item"><div><b>'+list[i].w+'</b><div class="small">'+list[i].m+'｜错 '+r.w+'｜'+(r.f?'已收藏':'')+'</div></div><button class="btn" onclick="speakOnce(\''+esc(list[i].w)+'\')">发音</button></div>'; } } html+='</div>'; $('viewManage').innerHTML=html; }
function importWords(rep){ var arr=parseImport($('importBox').value), i, map={}, out=[]; if(!arr.length){ alert('没有识别到词条'); return; } if(rep){ words=arr; state={}; game={level:1,best:0}; } else { for(i=0;i<words.length;i++){ map[words[i].w.toLowerCase()]=words[i]; } for(i=0;i<arr.length;i++){ map[arr[i].w.toLowerCase()]=arr[i]; } for(i in map){ out.push(map[i]); } words=out; } saveAll(); draw(); alert('导入成功：'+arr.length+' 个词'); }
function importProg(){ var c=prompt('粘贴进度码'); if(!c){return;} try{ var o=JSON.parse(decodeURIComponent(escape(atob(c)))); words=o.words||words; state=o.state||state; settings=o.settings||settings; game=o.game||game; $('goal').value=settings.goal||'20'; saveAll(); draw(); alert('进度已导入'); }catch(e){ alert('进度码错误'); } }
function restoreSeed(){ if(confirm('确认恢复示例词库？')){ words=mapSeed(); state={}; game={level:1,best:0}; saveAll(); draw(); } }
function shuffleWords(){ var i,j,t; for(i=words.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); t=words[i]; words[i]=words[j]; words[j]=t; } idx=0; saveAll(); draw(); }
function resetProgress(){ if(confirm('确认清空所有学习进度？')){ state={}; game={level:1,best:0}; saveAll(); draw(); } }
function draw(){ renderCats(); renderStats(); $('goal').value=settings.goal||'20'; hideAll(); if(mode==='learn'){$('viewLearn').className=''; renderLearn();} if(mode==='quiz'){$('viewQuiz').className=''; renderQuiz();} if(mode==='spell'){$('viewSpell').className=''; renderSpell();} if(mode==='review'){$('viewReview').className=''; renderReview();} if(mode==='game'){$('viewGame').className=''; renderGameHome();} if(mode==='manage'){$('viewManage').className=''; renderManage();} }
loadData(); $('jsStatus').className='status s-green'; $('jsStatus').innerHTML='JS已启动'; $('goal').value=settings.goal||'20'; draw();
</script>
</body></html>
